# Tomcat version and download
tomcat_version: "10.1.24"
tomcat_major_version: "10"
tomcat_archive_url: "https://dlcdn.apache.org/tomcat/tomcat-{{ tomcat_major_version }}/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"

# Installation paths
tomcat_install_dir: "/opt/tomcat"
tomcat_home: "{{ tomcat_install_dir }}/apache-tomcat-{{ tomcat_version }}"
tomcat_symlink: "/opt/tomcat/latest"

# Tomcat user/group
tomcat_user: "tomcat"
tomcat_group: "tomcat"

# JDK
java_package: "java-17-amazon-corretto-devel"

# Tomcat ports
tomcat_http_port: 8080
tomcat_shutdown_port: 8005

# Tomcat manager credentials
tomcat_admin_user: "admin"
tomcat_admin_password: "admin@123"
