# ==============================================================================
# Ansible Inventory
# Update IPs after Terraform apply using: terraform output ansible_inventory
# ==============================================================================

[tomcat_servers]
# <tomcat-private-ip> ansible_user=ec2-user

[mysql_servers]
# <mysql-private-ip> ansible_user=ec2-user

[all:vars]
ansible_ssh_private_key_file=~/.ssh/your-keypair.pem
ansible_python_interpreter=/usr/bin/python3
